<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Invita un familiare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-slot"></div>

<main class="container-narrow">
    <h1 class="mt-2">Invita un familiare</h1>

    <!-- STEP 1: domanda -->
    <section id="inv-step-question">
        <div class="card text-center">
            <p style="font-size:18px;font-weight:600;margin-bottom:20px">
                La persona che vuoi invitare è già presente nell'albero genealogico?
            </p>
            <div style="display:flex;gap:14px;flex-wrap:wrap">
                <button class="big-btn primary" style="flex:1" id="inv-yes-btn">Sì, è nell'albero</button>
                <button class="big-btn secondary" style="flex:1" id="inv-no-btn">No, devo aggiungerla</button>
            </div>
        </div>
    </section>

    <!-- STEP 2a: seleziona dall'albero -->
    <section id="inv-step-select" class="hidden">
        <div class="card">
            <h3>Chi vuoi invitare?</h3>
            <p class="text-muted mb-2">Seleziona la persona dall'albero genealogico.</p>
            <div id="inv-member-list" style="display:flex;flex-direction:column;gap:6px"></div>
            <button class="btn btn-outline mt-2" onclick="invShowStep('inv-step-question')">← Indietro</button>
        </div>
    </section>

    <!-- STEP 2b: form nuovo familiare -->
    <section id="inv-step-form" class="hidden">
        <div class="card">
            <h3>Aggiungi il nuovo familiare</h3>
            <p class="text-muted mb-2">Verrà inserito nell'albero e riceverà il link di invito.</p>
            <form id="inv-member-form">
                <div class="form-group">
                    <label for="inv-firstName">Nome</label>
                    <input type="text" id="inv-firstName" required>
                </div>
                <div class="form-group">
                    <label for="inv-lastName">Cognome</label>
                    <input type="text" id="inv-lastName" required>
                </div>
                <div class="form-group">
                    <label for="inv-gender">Genere</label>
                    <select id="inv-gender">
                        <option value="F">Femmina</option>
                        <option value="M">Maschio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="inv-birthDate">Data di nascita</label>
                    <input type="date" id="inv-birthDate">
                </div>
                <div id="inv-form-error" class="error-message hidden"></div>
                <div class="flex-row" style="justify-content:flex-end;gap:10px">
                    <button type="button" class="btn btn-outline" onclick="invShowStep('inv-step-question')">← Indietro</button>
                    <button type="submit" class="big-btn primary">Aggiungi e genera invito</button>
                </div>
            </form>
        </div>
    </section>

    <!-- STEP 3: link generato -->
    <section id="inv-step-link" class="hidden">
        <div class="card">
            <h3 id="inv-link-title">Invito pronto!</h3>
            <p class="text-muted mb-2" id="inv-link-subtitle"></p>

            <div class="form-group">
                <label>Codice invito</label>
                <div class="flex-row">
                    <input type="text" id="code-input" readonly style="font-family:monospace;font-size:18px">
                    <button class="btn btn-secondary" onclick="copyText('code-input')">Copia</button>
                </div>
            </div>
            <div class="form-group">
                <label>Link diretto</label>
                <div class="flex-row">
                    <input type="text" id="link-input" readonly>
                    <button class="btn btn-secondary" onclick="copyText('link-input')">Copia</button>
                </div>
            </div>

            <h3 class="mt-3">Condividi via</h3>
            <div class="flex-row mt-1" style="flex-wrap:wrap">
                <a id="wa-btn" class="big-btn primary" target="_blank" rel="noopener" style="flex:1">WhatsApp</a>
                <a id="mail-btn" class="big-btn outline" style="flex:1">Email</a>
                <a id="tg-btn" class="big-btn outline" target="_blank" rel="noopener" style="flex:1">Telegram</a>
            </div>
            <button class="btn btn-outline btn-block mt-2" onclick="window.location.href='home.html'">Torna alla Home</button>
        </div>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/invite.js"></script>
</body>
</html>
