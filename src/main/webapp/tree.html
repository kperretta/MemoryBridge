<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Albero genealogico</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tree-generations {
            display: flex;
            flex-direction: column;
            padding: 24px;
            align-items: center;
            gap: 70px;
        }
        .couple {
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }
        .generation { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .connector { width: 3px; height: 30px; background: var(--primary-light); margin: 0 auto; }
    </style>
</head>
<body>
<div id="navbar-slot"></div>

<main class="container">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <h1 style="margin:0">Albero genealogico</h1>
        <button class="big-btn primary" onclick="openAddFlow(null)">+ Aggiungi familiare</button>
    </div>
    <p class="text-muted mb-2">Tocca un membro della famiglia per vedere le azioni disponibili.</p>

    <div class="tree-container">
        <div id="tree" class="tree-generations">
            <p class="text-muted text-center">Caricamento…</p>
        </div>
    </div>
</main>

<!-- Menu contestuale nodo: 4 azioni richieste -->
<div class="modal-backdrop hidden" id="node-menu">
    <div class="modal" style="max-width:360px">
        <div class="modal-header">
            <h2 id="node-menu-name">…</h2>
            <button class="modal-close" onclick="closeNodeMenu()">×</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
            <button class="big-btn primary full" id="open-timeline-btn">Apri Timeline</button>
            <button class="big-btn secondary full" id="add-relative-btn">Aggiungi familiare</button>
            <button class="big-btn outline full" id="edit-btn">Modifica persona</button>
            <button class="big-btn danger full" id="delete-btn">Elimina persona</button>
        </div>
    </div>
</div>

<!-- Picker relazione -->
<div class="modal-backdrop hidden" id="relation-modal">
    <div class="modal" style="max-width:420px">
        <div class="modal-header">
            <h2>Che relazione ha con <span id="relation-target-name"></span>?</h2>
            <button class="modal-close" onclick="closeRelationModal()">×</button>
        </div>
        <div class="relation-grid" id="relation-grid"></div>
    </div>
</div>

<!-- Form dati familiare -->
<div class="modal-backdrop hidden" id="member-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modal-title">Aggiungi familiare</h2>
            <button class="modal-close" onclick="closeMemberModal()">×</button>
        </div>
        <p class="text-muted" id="relation-hint" style="margin-bottom:12px"></p>
        <form id="member-form">
            <input type="hidden" id="member-id">
            <div class="form-group">
                <label for="m-firstName">Nome</label>
                <input type="text" id="m-firstName" required>
            </div>
            <div class="form-group">
                <label for="m-lastName">Cognome</label>
                <input type="text" id="m-lastName" required>
            </div>
            <div class="form-group">
                <label for="m-gender">Genere</label>
                <select id="m-gender">
                    <option value="F">Femmina</option>
                    <option value="M">Maschio</option>
                </select>
            </div>
            <div class="form-group">
                <label for="m-birthDate">Data di nascita</label>
                <input type="date" id="m-birthDate">
            </div>
            <div class="form-group">
                <label for="m-deathDate">Data di morte <span class="text-muted">(vuota se vivente)</span></label>
                <input type="date" id="m-deathDate">
            </div>
            <div class="form-group">
                <label for="m-birthPlace">Luogo di nascita</label>
                <input type="text" id="m-birthPlace">
            </div>
            <div class="form-group">
                <label for="m-description">Descrizione</label>
                <textarea id="m-description" placeholder="Racconta brevemente chi è questa persona…"></textarea>
            </div>
            <div class="form-group">
                <label for="m-photo">Foto profilo</label>
                <input type="file" id="m-photo" accept="image/*">
                <div id="m-photo-preview" class="mt-1"></div>
            </div>
            <div id="member-error" class="error-message hidden"></div>
            <div class="modal-actions">
                <button type="button" class="big-btn outline" onclick="closeMemberModal()">Annulla</button>
                <button type="submit" class="big-btn primary">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/tree.js"></script>
</body>
</html>
