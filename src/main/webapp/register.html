<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Registrati</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .family-choice {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .family-choice label {
            flex: 1;
            min-width: 140px;
            text-align: center;
            border: 2px solid var(--primary-light);
            border-radius: 8px;
            padding: 10px 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.15s, border-color 0.15s;
        }
        .family-choice input {
            display: none;
        }
        .family-choice input:checked + label {
            border-color: var(--primary);
            background: var(--primary-light);
            font-weight: 600;
        }
        .family-detail { display: none; }
        .family-detail.active { display: block; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <img src="img/site/logo.png" alt="Logo del sito" width="250" height="250" style="display: block; margin: 0 auto;">
        <img src="img/site/title.png" alt="Nome del sito" width="250" height="90" style="display: block; margin: 0 auto;">

        <p class="subtitle">Crea il tuo account ed inizia a raccontare la tua storia!</p>

        <form id="register-form">
            <div class="form-group">
                <label for="firstName">Nome</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Cognome</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="4">
            </div>

            <div class="form-group">
                <label>Il tuo nucleo familiare</label>
                <div class="family-choice">
                    <input type="radio" name="familyChoice" id="choice-invite" value="invite">
                    <label for="choice-invite">Ho un codice invito</label>

                    <input type="radio" name="familyChoice" id="choice-existing" value="existing">
                    <label for="choice-existing">Ho un codice famiglia</label>

                    <input type="radio" name="familyChoice" id="choice-new" value="new">
                    <label for="choice-new">Crea un nuovo nucleo</label>
                </div>

                <div class="family-detail" id="detail-invite">
                    <p class="text-muted" style="margin-top:4px;font-size:0.85em">
                        Inserisci il tuo codice invito:
                    </p>
                    <input type="text" id="inviteCode" placeholder="es. A1B2C3D4">
                </div>
                <div class="family-detail" id="detail-existing">
                    <p class="text-muted" style="margin-top:4px;font-size:0.85em">
                        Inserisci il codice identificativo del tuo nucleo familiare:
                    </p>
                    <input type="text" id="familyCode" placeholder="es. ROSSI2025">
                </div>
                <div class="family-detail" id="detail-new">
                    <p class="text-muted" style="margin-top:4px;font-size:0.85em">
                        Scegli un nome per il tuo nuovo nucleo familiare:
                    </p>
                    <input type="text" id="newFamilyName" placeholder="Es. Famiglia Rossi">
                </div>
            </div>

            <div id="error" class="error-message hidden"></div>
            <button type="submit" class="btn btn-primary btn-block">Registrati</button>
        </form>

        <div class="auth-footer">
            Hai già un account? <a href="index.html">Accedi</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    // Pre-compila e seleziona automaticamente l'opzione "invito" se presente
    // nell'URL: register.html?invite=XXXX
    const urlInvite = new URLSearchParams(window.location.search).get('invite');
    const choices = ['invite', 'existing', 'new'];

    function showDetail(choice) {
        choices.forEach(c => {
            document.getElementById(`detail-${c}`).classList.toggle('active', c === choice);
        });
    }

    choices.forEach(c => {
        document.getElementById(`choice-${c}`).addEventListener('change', () => showDetail(c));
    });

    if (urlInvite) {
        document.getElementById('inviteCode').value = urlInvite;
        document.getElementById('choice-invite').checked = true;
        showDetail('invite');
    } else {
        document.getElementById('choice-new').checked = true;
        showDetail('new');
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('error');
        errEl.classList.add('hidden');

        const choice = document.querySelector('input[name="familyChoice"]:checked')?.value;
        if (!choice) {
            errEl.textContent = 'Scegli come vuoi collegarti a un nucleo familiare';
            errEl.classList.remove('hidden');
            return;
        }

        const body = {
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            inviteCode: choice === 'invite' ? document.getElementById('inviteCode').value.trim() : '',
            familyCode: choice === 'existing' ? document.getElementById('familyCode').value.trim() : '',
            newFamilyName: choice === 'new' ? document.getElementById('newFamilyName').value.trim() : ''
        };

        if (choice === 'invite' && !body.inviteCode) {
            errEl.textContent = 'Inserisci il codice invito ricevuto';
            errEl.classList.remove('hidden');
            return;
        }
        if (choice === 'existing' && !body.familyCode) {
            errEl.textContent = 'Inserisci il codice famiglia';
            errEl.classList.remove('hidden');
            return;
        }
        if (choice === 'new' && !body.newFamilyName) {
            errEl.textContent = 'Dai un nome al tuo nuovo nucleo familiare';
            errEl.classList.remove('hidden');
            return;
        }

        try {
            await api.post('/api/register', body);
            window.location.href = 'home.html';
        } catch (err) {
            errEl.textContent = err.message;
            errEl.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
