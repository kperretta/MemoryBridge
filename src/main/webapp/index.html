<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Accedi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <img src="img/site/logo.png" alt="Logo del sito" width="250" height="250" style="display: block; margin: 0 auto;">
        <img src="img/site/title.png" alt="Nome del sito" width="250" height="90" style="display: block; margin: 0 auto;">

        <p class="subtitle">Accedi per continuare a raccontare la tua storia</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" placeholder="Inserisci qui la tua email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="Inserisci qui la tua password">
            </div>
            <div id="error" class="error-message hidden"></div>
            <button type="submit" class="btn btn-primary btn-block">Accedi</button>
        </form>

        <div class="auth-footer">
            Non hai un account? <a href="register.html">Registrati</a>
        </div>
        <div class="auth-footer mt-2" style="font-size:12px">
            Demo: <strong>maria@test.it</strong> / <strong>marco@test.it</strong> / <strong>sofia@test.it</strong><br>
            Password: <strong>password</strong>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error');
        errEl.classList.add('hidden');

        try {
            await api.post('/api/login', { email, password });
            window.location.href = 'home.html';
        } catch (err) {
            errEl.textContent = err.message || 'Errore di login';
            errEl.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
