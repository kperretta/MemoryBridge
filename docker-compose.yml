# Avvia Ollama con il modello già scaricato e pronto all'uso, senza setup manuale.
#
# USO (chi clona il repository deve solo avere Docker installato):
#     docker compose up
#
# La prima volta scarica l'immagine di Ollama e il modello (qualche minuto,
# richiede internet). Le volte successive parte quasi subito, perché il
# modello resta salvato nel volume Docker "ollama_data" tra un riavvio e
# l'altro. Il server Java (Tomcat/IDE) va comunque avviato separatamente
# come sempre: questo file gestisce solo la parte "AI locale".
version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: memorybridge-ollama
    ports:
      - "11434:11434"   # stessa porta che OllamaApiClient.java si aspetta su localhost
    volumes:
      - ollama_data:/root/.ollama
    # Avvia il server Ollama e, in parallelo, scarica automaticamente il
    # modello se non è già presente nel volume. "wait" mantiene il
    # container vivo dopo il pull.
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait"]
    restart: unless-stopped

volumes:
  ollama_data:
