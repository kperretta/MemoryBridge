<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Accedi</title>

    <!-- Font moderni da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4E85BF;
            --primary-dark: #33628F;
            --primary-light: #82B0E1;
            --accent: #D99364;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-main: #1E293B;
            --text-muted: #64748B;
            --danger: #E11D48;
            --danger-bg: #FFE4E6;
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-pill: 999px;
            --shadow-glow: 0 20px 40px -15px rgba(51, 98, 143, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f5;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* SFONDO ANIMATO DECORATIVO */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            top: 0;
            left: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 350px;
            height: 350px;
            background: #4E85BF;
            top: -50px;
            left: -50px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #D99364;
            bottom: -100px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        /* CONTENITORE PRINCIPALE FORM E LOGO */
        .auth-page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: center;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), var(--shadow-glow);
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* COLONNA SINISTRA (BRANDING & LOGO) */
        .brand-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(239, 244, 249, 0.8) 100%);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: scale(1.03);
        }

        .site-logo {
            max-width: 180px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.06));
        }

        .site-title-img {
            max-width: 200px;
            height: auto;
            margin-top: 10px;
            object-fit: contain;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-top: 16px;
            font-weight: 500;
        }

        /* COLONNA DESTRA (FORM ACCESSO) */
        .form-section {
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.75rem;
            color: var(--primary-dark);
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 2px solid #E2E8F0;
            border-radius: var(--radius-md);
            background: #FFFFFF;
            color: var(--text-main);
            transition: all 0.25s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(78, 133, 191, 0.15);
            background: #FFFFFF;
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        /* MESSAGGI DI ERRORE */
        .error-message {
            background-color: var(--danger-bg);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(225, 29, 72, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* BOTTONI */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-pill);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 14px rgba(78, 133, 191, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 133, 191, 0.5);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-dark) 100%);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* FOOTER E ACCOUNT DEMO */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-dark);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .demo-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(239, 244, 249, 0.7);
            border: 1px dashed var(--primary-light);
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .demo-box strong {
            color: var(--primary-dark);
        }

        .demo-emails {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .demo-chip {
            background: #FFFFFF;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid #CBD5E1;
            font-family: monospace;
            font-size: 0.75rem;
        }

        /* RESPONSIVE DESIGN (MOBILE) */
        @media (max-width: 768px) {
            .auth-card {
                grid-template-columns: 1fr;
                max-width: 440px;
            }

            .brand-section {
                padding: 32px 24px 20px 24px;
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.05);
            }

            .form-section {
                padding: 32px 24px;
            }

            .site-logo {
                max-width: 130px;
            }

            .site-title-img {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>

<!-- Elementi decorativi di sfondo -->
<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
</div>

<div class="auth-page">
    <div class="auth-card">

        <!-- Colonna Sinistra: Brand & Identità -->
        <div class="brand-section">
            <div class="logo-wrapper">
                <img src="img/site/logo.png" alt="Logo Memory Bridge" class="site-logo">
            </div>
            <img src="img/site/title.png" alt="Memory Bridge" class="site-title-img">
            <p class="subtitle">Accedi per continuare a raccontare e custodire la tua storia.</p>
        </div>

        <!-- Colonna Destra: Modulo Login -->
        <div class="form-section">
            <h1 class="form-title">Bentornato! 👋</h1>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Indirizzo Email</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="nome@esempio.it">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <div id="error" class="error-message hidden"></div>

                <button type="submit" class="btn btn-primary">Accedi al tuo profilo</button>
            </form>

            <div class="auth-footer">
                Non hai ancora un account? <a href="register.html">Registrati ora</a>
            </div>

            <!-- Box Demo migliorato -->
            <div class="demo-box">
                <span>Account Demo per i test:</span>
                <div class="demo-emails">
                    <span class="demo-chip">maria@test.it</span>
                    <span class="demo-chip">marco@test.it</span>
                    <span class="demo-chip">sofia@test.it</span>
                </div>
                <span>Password universale: <strong>password</strong></span>
            </div>
        </div>

    </div>
</div>

<!-- Script JavaScript invariato nel funzionamento -->
<script src="js/api.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error');
        errEl.classList.add('hidden');

        try {
            await api.post('/api/login', { email, password });
            window.location.href = 'home.html';
        } catch (err) {
            errEl.textContent = err.message || 'Errore di login. Verifica le credenziali.';
            errEl.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
