<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Crea contenuto</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 450px;
            height: 450px;
            background: #4E85BF;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #D99364;
            bottom: -100px;
            right: -80px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        main.container-narrow {
            position: relative;
            z-index: 1;
        }

        .type-card, .card {
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .type-card:hover {
            transform: translateY(-3px);
        }

        .gufo-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gufo-badge {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #33628F;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(51, 98, 143, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .gufo-avatar {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: none;
            box-shadow: 0 10px 25px rgba(51, 98, 143, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }

        .gufo-widget:hover {
            transform: translateY(-4px);
        }

        .gufo-widget:hover .gufo-avatar {
            transform: scale(1.06);
            box-shadow: 0 14px 30px rgba(51, 98, 143, 0.35);
        }

        .gufo-widget:hover .gufo-badge {
            background: #4E85BF;
            color: #ffffff;
            box-shadow: 0 10px 22px rgba(78, 133, 191, 0.35);
        }

        @media (max-width: 600px) {
            .gufo-widget {
                bottom: 16px;
                right: 16px;
                gap: 8px;
            }
            .gufo-avatar {
                width: 75px;
                height: 75px;
            }
            .gufo-badge {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
</div>

<div id="navbar-slot"></div>

<main class="container-narrow" style="max-width:800px">

    <!-- STEP 1: scelta tipo -->
    <section id="step-type">
        <h1>Cosa vuoi condividere?</h1>
        <p class="text-muted">Scegli il tipo di contenuto toccando uno dei riquadri.</p>

        <div class="type-choice-grid">
            <div class="type-card" data-type="audio">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
                <div class="type-label">Audio</div>
            </div>
            <div class="type-card" data-type="video">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </div>
                <div class="type-label">Video</div>
            </div>
            <div class="type-card" data-type="photo">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <div class="type-label">Immagine</div>
            </div>

        </div>

        <a href="chat.html" class="gufo-widget ${activeSection === 'chat' ? 'active' : ''}">
            <span class="gufo-badge">Racconta ad Iris ✨</span>
            <img src="img/site/gufo.png" alt="Vai alla chat" class="gufo-avatar">
        </a>
    </section>

    <!-- STEP 2: caricamento/registrazione + Iris consiglia + azioni -->
    <section id="step-capture" class="hidden">
        <h1 id="capture-title">Carica il tuo contenuto</h1>

        <div class="capture-bar" id="capture-bar"></div>

        <div class="media-preview-large" id="capture-preview"></div>

        <div class="card content-form mt-2">
            <h3 class="content-form-heading">Dettagli del ricordo</h3>

            <div class="content-form-grid">
                <div class="form-group">
                    <label for="c-title">Titolo</label>
                    <input type="text" id="c-title" placeholder="es. La festa dei 60 anni di zio Franco">
                </div>

                <div class="form-group">
                    <label for="c-person">Protagonista</label>
                    <select id="c-person"></select>
                </div>

                <div class="form-group">
                    <label for="c-eventDate">Quando è successo? <span class="label-optional">(Facoltativo)</span></label>
                    <input type="date" id="c-eventDate" max="">
                </div>
            </div>

            <div class="form-group mb-0">
                <label for="c-description">Didascalia <span class="label-optional">(Facoltativa)</span></label>
                <!-- Banner Iris consiglia -->
                <div class="iris-banner">
                    <div class="iris-avatar-sm">
                        <img src="img/site/gufo.png" alt="Iris" style="width:120%;height:120%;object-fit:cover;">
                    </div>
                    <div>
                        <h3>
                            <img src="img/site/gufo.png" alt="Iris" style="width:22px;height:22px;object-fit:cover;border-radius:50%;vertical-align:middle;margin-right:6px">
                            Iris consiglia
                        </h3>
                        <div id="iris-suggestions"></div>
                    </div>
                </div>
                <textarea id="c-description" placeholder="Aggiungi una didascalia…"></textarea>
            </div>
        </div>

        <div id="c-error" class="error-message hidden"></div>

        <div class="flex-row mt-2" style="flex-wrap:wrap">
            <button class="big-btn primary" id="publish-btn" style="flex:1">Pubblica</button>
        </div>
        <button class="btn btn-outline btn-block mt-2" onclick="window.location.href='home.html'">Annulla</button>
    </section>

    <section id="step-done" class="hidden text-center">

        <img src="img/site/gufo.png" alt="Avatar Gufo" style="width: 140px; height: 140px; object-fit: cover; border-radius: 50%; box-shadow: 0 10px 25px rgba(51, 98, 143, 0.25);">

        <h1 class="mt-2">Contenuto pubblicato!</h1>
        <p class="text-muted mb-2">Il tuo ricordo ora fa parte della storia della tua famiglia.</p>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:24px">
            <button class="big-btn primary full" id="show-content-btn">Mostra contenuto</button>
            <button class="big-btn secondary full" onclick="window.location.href='home.html'">Vai alla Home</button>
        </div>
    </section>

</main>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/create.js"></script>
</body>
</html>
