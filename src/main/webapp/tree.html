<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Albero genealogico</title>

    <!-- Font moderni Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* SFONDO DINAMICO CON GRADIENTE ANIMATO */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 450px;
            height: 450px;
            background: #4E85BF;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #D99364;
            bottom: -100px;
            right: -80px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        /* CONTENITORE PRINCIPALE */
        main.container {
            position: relative;
            z-index: 1;
        }

        /* BARRA TESTATA ALBERO */
        .tree-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tree-header-bar h1 {
            margin: 0;
            font-family: 'Fredoka', cursive, sans-serif;
            color: #1e293b;
        }

        .btn-add-family {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #4E85BF;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(78, 133, 191, 0.25);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-add-family:hover {
            background: #33628F;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(51, 98, 143, 0.35);
        }

        /* ===== STILI CUSTOM ORIGINALI PER L'ALBERO (INALTERATI) ===== */
        .tree-generations {
            display: flex;
            flex-direction: column;
            padding: 24px;
            align-items: center;
            gap: 70px;
        }

        .couple {
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }

        .generation {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .connector {
            width: 3px;
            height: 30px;
            background: var(--primary-light, #80A8D1);
            margin: 0 auto;
        }

        /* ===== STILE NODO FANTASMA (INALTERATO) ===== */
        .tree-node.phantom-node {
            border: 2px dashed var(--primary-light, #a0a0a0);
            background-color: rgba(0, 0, 0, 0.03);
            opacity: 0.75;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tree-node.phantom-node:hover {
            opacity: 1;
            border-style: solid;
            background-color: rgba(0, 0, 0, 0.06);
        }

        .tree-node.phantom-node .tree-node-name {
            font-style: italic;
            color: var(--text-muted, #777);
        }

        /* GESTIONE SICURA DEI MODALI */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .modal-backdrop.hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .modal {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            box-sizing: border-box;
            overflow-y: auto;
            animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: #1e293b;
        }

        .modal-close {
            background: transparent;
            border: none;
            font-size: 24px;
            line-height: 1;
            color: #64748b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        /* FLOATING WIDGET GUFO / IRIS */
        .gufo-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gufo-badge {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #33628F;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(51, 98, 143, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .gufo-avatar {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: none;
            box-shadow: 0 10px 25px rgba(51, 98, 143, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }

        .gufo-widget:hover {
            transform: translateY(-4px);
        }

        .gufo-widget:hover .gufo-avatar {
            transform: scale(1.06);
            box-shadow: 0 14px 30px rgba(51, 98, 143, 0.35);
        }

        .gufo-widget:hover .gufo-badge {
            background: #4E85BF;
            color: #ffffff;
            box-shadow: 0 10px 22px rgba(78, 133, 191, 0.35);
        }

        @media (max-width: 600px) {
            .modal {
                padding: 18px;
                max-height: 90vh;
            }
            .gufo-widget {
                bottom: 16px;
                right: 16px;
                gap: 8px;
            }
            .gufo-avatar {
                width: 75px;
                height: 75px;
            }
            .gufo-badge {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

<!-- SFONDO ANIMATO DECORATIVO -->
<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
</div>

<div id="navbar-slot"></div>

<main class="container">
    <div class="tree-header-bar">
        <h1>Albero genealogico</h1>
        <button class="btn-add-family" onclick="openAddFlow(null)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Aggiungi familiare
        </button>
    </div>
    <p class="text-muted mb-2">Passa il mouse su un membro della famiglia per vedere le azioni disponibili.</p>

    <div class="tree-container">
        <div id="tree" class="tree-generations">
            <p class="text-muted text-center">Caricamento…</p>
        </div>
    </div>
</main>

<!-- WIDGET FLOATING IRIS -->
<a href="chat.html" class="gufo-widget">
    <span class="gufo-badge">Racconta ad Iris ✨</span>
    <img src="img/site/gufo.png" alt="Vai alla chat" class="gufo-avatar">
</a>

<!-- Picker relazione -->
<div class="modal-backdrop hidden" id="relation-modal">
    <div class="modal" style="max-width:420px">
        <div class="modal-header">
            <h2>Che relazione ha con <span id="relation-target-name"></span>?</h2>
            <button class="modal-close" onclick="closeRelationModal()">×</button>
        </div>
        <div class="relation-grid" id="relation-grid"></div>
    </div>
</div>

<!-- Form dati familiare -->
<div class="modal-backdrop hidden" id="member-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modal-title">Aggiungi familiare</h2>
            <button class="modal-close" onclick="closeMemberModal()">×</button>
        </div>
        <p class="text-muted" id="relation-hint" style="margin-bottom:12px"></p>
        <form id="member-form">
            <input type="hidden" id="member-id">
            <div class="form-group">
                <label for="m-firstName">Nome</label>
                <input type="text" id="m-firstName" required>
            </div>
            <div class="form-group">
                <label for="m-lastName">Cognome</label>
                <input type="text" id="m-lastName" required>
            </div>
            <div class="form-group">
                <label for="m-gender">Genere</label>
                <select id="m-gender">
                    <option value="F">Femmina</option>
                    <option value="M">Maschio</option>
                </select>
            </div>
            <div class="form-group">
                <label for="m-birthDate">Data di nascita</label>
                <input type="date" id="m-birthDate">
            </div>
            <div class="form-group">
                <label for="m-deathDate">Data di morte <span class="text-muted">(vuota se vivente)</span></label>
                <input type="date" id="m-deathDate">
            </div>
            <div class="form-group">
                <label for="m-birthPlace">Luogo di nascita</label>
                <input type="text" id="m-birthPlace">
            </div>
            <div class="form-group">
                <label for="m-description">Descrizione</label>
                <textarea id="m-description" placeholder="Racconta brevemente chi è questa persona…"></textarea>
            </div>
            <div class="form-group">
                <label for="m-photo">Foto profilo</label>
                <input type="file" id="m-photo" accept="image/*">
                <div id="m-photo-preview" class="mt-1"></div>
            </div>
            <div id="member-error" class="error-message hidden"></div>
            <div class="modal-actions">
                <button type="button" class="big-btn outline" onclick="closeMemberModal()">Annulla</button>
                <button type="submit" class="big-btn primary">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/tree.js"></script>
</body>
</html>
