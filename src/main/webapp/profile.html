<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Profilo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 450px;
            height: 450px;
            background: #4E85BF;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #D99364;
            bottom: -100px;
            right: -80px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.08); }
        }

        main.container {
            position: relative;
            z-index: 1;
        }

        .profile-nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #33628F;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(78, 133, 191, 0.25);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(51, 98, 143, 0.06);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-back:hover {
            background: #ffffff;
            color: #1e3a5f;
            transform: translateX(-3px);
            box-shadow: 0 6px 16px rgba(51, 98, 143, 0.12);
            border-color: rgba(78, 133, 191, 0.4);
        }

        .btn-back svg {
            transition: transform 0.25s ease;
        }

        .btn-back:hover svg {
            transform: translateX(-2px);
        }

        .btn-edit-profile {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            color: #33628F;
            border: 1.5px solid #4E85BF;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(78, 133, 191, 0.12);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-edit-profile:hover {
            background: #4E85BF;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78, 133, 191, 0.25);
        }

        .btn-edit-profile.hidden {
            display: none !important;
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .modal-backdrop.hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .modal {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 560px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            box-sizing: border-box;
            overflow-y: auto;
            animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: #1e293b;
        }

        .modal-close {
            background: transparent;
            border: none;
            font-size: 24px;
            line-height: 1;
            color: #64748b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .gufo-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gufo-badge {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #33628F;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(51, 98, 143, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .gufo-avatar {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: none;
            box-shadow: 0 10px 25px rgba(51, 98, 143, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }

        .gufo-widget:hover {
            transform: translateY(-4px);
        }

        .gufo-widget:hover .gufo-avatar {
            transform: scale(1.06);
            box-shadow: 0 14px 30px rgba(51, 98, 143, 0.35);
        }

        .gufo-widget:hover .gufo-badge {
            background: #4E85BF;
            color: #ffffff;
            box-shadow: 0 10px 22px rgba(78, 133, 191, 0.35);
        }

        @media (max-width: 600px) {
            .modal {
                padding: 18px;
                max-height: 90vh;
            }
            .gufo-widget {
                bottom: 16px;
                right: 16px;
                gap: 8px;
            }
            .gufo-avatar {
                width: 75px;
                height: 75px;
            }
            .gufo-badge {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

<!-- SFONDO ANIMATO DECORATIVO -->
<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
</div>

<div id="navbar-slot"></div>

<main class="container">
    <!-- Intestazione superiore migliorata -->
    <div class="profile-nav-bar">
        <a href="tree.html" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Torna all'albero
        </a>
        <!-- Mostrato via JS solo se questo è il profilo dell'utente loggato -->
        <button class="btn-edit-profile hidden" id="edit-profile-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            Modifica profilo
        </button>
    </div>

    <!-- Dati personali in alto -->
    <div class="card mt-2" id="profile-card">
        <p class="text-muted">Caricamento…</p>
    </div>

    <!-- Familiari stretti (sx) + Personalità Iris (dx) -->
    <div class="profile-columns">
        <div class="card" style="margin-bottom:0">
            <h3>Familiari più stretti</h3>
            <div id="relatives-list"><p class="text-muted">Caricamento…</p></div>
        </div>
        <div class="card" style="margin-bottom:0">
            <h3>La sua personalità <span class="text-muted" style="font-size:13px;font-weight:400">— secondo Iris</span></h3>
            <p id="personality-text" class="text-muted">Iris sta componendo il ritratto…</p>
        </div>
    </div>

    <!-- Timeline verticale -->
    <h2 class="mt-3">Timeline dei ricordi</h2>
    <div class="timeline" id="timeline">
        <p class="text-muted">Caricamento…</p>
    </div>
</main>

<!-- WIDGET FLOATING IRIS -->
<a href="chat.html" class="gufo-widget">
    <span class="gufo-badge">Racconta ad Iris ✨</span>
    <img src="img/site/gufo.png" alt="Vai alla chat" class="gufo-avatar">
</a>

<!-- Modal ricordo espanso -->
<div class="modal-backdrop hidden" id="memory-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="memory-title">…</h2>
            <button class="modal-close" onclick="closeMemoryModal()">×</button>
        </div>
        <div id="memory-body"></div>
    </div>
</div>

<!-- Modal modifica profilo (solo per il proprietario) -->
<div class="modal-backdrop hidden" id="member-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modal-title">Modifica profilo</h2>
            <button class="modal-close" onclick="closeMemberModal()">×</button>
        </div>
        <p class="text-muted" id="relation-hint" style="margin-bottom:12px"></p>
        <form id="member-form">
            <input type="hidden" id="member-id">
            <div class="form-group">
                <label for="m-firstName">Nome</label>
                <input type="text" id="m-firstName" required>
            </div>
            <div class="form-group">
                <label for="m-lastName">Cognome</label>
                <input type="text" id="m-lastName" required>
            </div>
            <div class="form-group">
                <label for="m-gender">Genere</label>
                <select id="m-gender">
                    <option value="F">Femmina</option>
                    <option value="M">Maschio</option>
                </select>
            </div>
            <div class="form-group">
                <label for="m-birthDate">Data di nascita</label>
                <input type="date" id="m-birthDate">
            </div>
            <div class="form-group">
                <label for="m-deathDate">Data di morte <span class="text-muted">(vuota se vivente)</span></label>
                <input type="date" id="m-deathDate">
            </div>
            <div class="form-group">
                <label for="m-birthPlace">Luogo di nascita</label>
                <input type="text" id="m-birthPlace">
            </div>
            <div class="form-group">
                <label for="m-description">Descrizione</label>
                <textarea id="m-description" placeholder="Racconta brevemente chi è questa persona…"></textarea>
            </div>
            <div class="form-group">
                <label for="m-photo">Foto profilo</label>
                <input type="file" id="m-photo" accept="image/*">
                <div id="m-photo-preview" class="mt-1"></div>
            </div>
            <div id="member-error" class="error-message hidden"></div>
            <div class="modal-actions">
                <button type="button" class="big-btn outline" onclick="closeMemberModal()">Annulla</button>
                <button type="submit" class="big-btn primary">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
