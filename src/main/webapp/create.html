<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Bridge - Crea contenuto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-slot"></div>

<main class="container-narrow" style="max-width:800px">

    <!-- STEP 1: scelta tipo -->
    <section id="step-type">
        <h1>
            Cosa vuoi condividere?</h1>
        <p class="text-muted">Scegli il tipo di contenuto toccando uno dei riquadri.</p>

        <div class="type-choice-grid">
            <div class="type-card" data-type="audio">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
                <div class="type-label">Audio</div>
            </div>
            <div class="type-card" data-type="video">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </div>
                <div class="type-label">Video</div>
            </div>
            <div class="type-card" data-type="photo">
                <div class="type-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <div class="type-label">Immagine</div>
            </div>

        </div>
        <a href="chat.html" class="${activeSection === 'chat' ? 'active' : ''}" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: block;">
            <img src="img/site/gufo.png" alt="Vai alla chat" style="width:120px; height:120px; object-fit: cover; border-radius: 50%;">
        </a>
    </section>

    <!-- STEP 2: caricamento/registrazione + Iris consiglia + azioni -->
    <section id="step-capture" class="hidden">
        <h1 id="capture-title">Carica il tuo contenuto</h1>

        <div class="capture-bar" id="capture-bar"></div>

        <div class="media-preview-large" id="capture-preview"></div>

        <div class="card content-form mt-2">
            <h3 class="content-form-heading">Dettagli del ricordo</h3>

            <div class="content-form-grid">
                <div class="form-group">
                    <label for="c-title">Titolo</label>
                    <input type="text" id="c-title" placeholder="es. La festa dei 60 anni di zio Franco">
                </div>

                <div class="form-group">
                    <label for="c-person">Protagonista</label>
                    <select id="c-person"></select>
                </div>

                <div class="form-group">
                    <label for="c-eventDate">Quando è successo? <span class="label-optional">(Facoltativo)</span></label>
                    <input type="date" id="c-eventDate" max="">
                </div>
            </div>

            <div class="form-group mb-0">
                <label for="c-description">Didascalia <span class="label-optional">(Facoltativa)</span></label>
                <!-- Banner Iris consiglia -->
                <div class="iris-banner">
                    <div class="iris-avatar-sm">
                        <img src="img/site/gufo.png" alt="Iris" style="width:120%;height:120%;object-fit:cover;">
                    </div>
                    <div>
                        <h3>
                            <img src="img/site/gufo.png" alt="Iris" style="width:22px;height:22px;object-fit:cover;border-radius:50%;vertical-align:middle;margin-right:6px">
                            Iris consiglia
                        </h3>
                        <div id="iris-suggestions"></div>
                    </div>
                </div>
                <textarea id="c-description" placeholder="Aggiungi una didascalia…"></textarea>
            </div>
        </div>

        <div id="c-error" class="error-message hidden"></div>

        <div class="flex-row mt-2" style="flex-wrap:wrap">
            <button class="big-btn primary" id="publish-btn" style="flex:1">Pubblica</button>
        </div>
        <button class="btn btn-outline btn-block mt-2" onclick="window.location.href='home.html'">Annulla</button>
    </section>

    <!-- pubblicato! -->
    <section id="step-done" class="hidden text-center">

        <img src="img/site/gufo.png" alt="Avatar Gufo" style="width: 40%; height: 40%; object-fit: cover; border-radius: 50%;">

        <h1>Contenuto pubblicato!</h1>
        <p class="text-muted mb-2">Il tuo ricordo ora fa parte della storia della tua famiglia.</p>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:24px">
            <button class="big-btn primary full" id="show-content-btn">Mostra contenuto</button>
            <button class="big-btn secondary full" onclick="window.location.href='home.html'">Vai alla Home</button>
        </div>
    </section>

</main>

<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/create.js"></script>
</body>
</html>
